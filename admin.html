<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>内容管理</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="admin-page">
    <main class="admin-shell">
      <section class="admin-card" id="loginPanel">
        <p class="eyebrow">Admin</p>
        <h1>内容管理</h1>
        <p class="admin-muted">登录后可以添加作品和学习笔记。密码只在服务器环境变量中配置。</p>

        <form class="admin-form" id="loginForm">
          <label>
            <span>管理密码</span>
            <input name="password" type="password" autocomplete="current-password" required />
          </label>
          <button type="submit">登录</button>
        </form>
      </section>

      <section class="admin-card" id="editorPanel" hidden>
        <div class="admin-topbar">
          <div>
            <p class="eyebrow">Dashboard</p>
            <h1>添加内容</h1>
          </div>
          <div class="admin-actions">
            <a class="ghost-button" href="index.html">返回首页</a>
            <button class="ghost-button" id="logoutButton" type="button">退出</button>
          </div>
        </div>

        <div class="editor-grid">
          <form class="admin-form" id="workForm">
            <h2>添加作品</h2>
            <label>
              <span>标题</span>
              <input name="title" required />
            </label>
            <label>
              <span>类型</span>
              <input name="type" placeholder="Web / Design / Code" required />
            </label>
            <label>
              <span>分类</span>
              <select name="category" required>
                <option value="web">网页</option>
                <option value="design">设计</option>
                <option value="code">代码</option>
              </select>
            </label>
            <label>
              <span>作品链接</span>
              <input name="url" type="url" placeholder="https://..." />
            </label>
            <label>
              <span>关键词</span>
              <input name="keywords" placeholder="前端 作品 练习" />
            </label>
            <label>
              <span>描述</span>
              <textarea name="description" rows="5" required></textarea>
            </label>
            <button type="submit">保存作品</button>
          </form>

          <form class="admin-form" id="noteForm">
            <h2>添加学习笔记</h2>
            <label>
              <span>日期</span>
              <input name="date" type="date" required />
            </label>
            <label>
              <span>标题</span>
              <input name="title" required />
            </label>
            <label>
              <span>关键词</span>
              <input name="keywords" placeholder="CSS JavaScript 复盘" />
            </label>
            <label>
              <span>内容</span>
              <textarea name="content" rows="9" required></textarea>
            </label>
            <button type="submit">保存笔记</button>
          </form>
        </div>

        <p class="admin-status" id="statusText" role="status"></p>
      </section>
    </main>

    <script src="admin.js"></script>
  </body>
</html>
